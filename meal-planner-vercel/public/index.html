function calcMealTotals(ingredients) {
  return ingredients.reduce((acc, ing) => ({
    calories: acc.calories + Math.round(ing.qty * ing.calsPerUnit),
    protein:  acc.protein  + Math.round(ing.qty * ing.protein),
    carbs:    acc.carbs    + Math.round(ing.qty * ing.carbs),
    fat:      acc.fat      + Math.round(ing.qty * ing.fat),
  }), {calories:0,protein:0,carbs:0,fat:0});
}

// Returns per-serving nutrition. If meal has no servings set, returns full totals (assumes 1 serving).
function calcPerServing(meal) {
  const totals = calcMealTotals(meal.ingredients || []);
  const servings = meal.servings && meal.servings > 1 ? meal.servings : 1;
  return {
    calories: Math.round(totals.calories / servings),
    protein:  Math.round(totals.protein  / servings),
    carbs:    Math.round(totals.carbs    / servings),
    fat:      Math.round(totals.fat      / servings),
    servings,
    totalCalories: totals.calories, // keep full total accessible
  };
}

function calColor(cals, goal=CALORIE_GOAL) {
  const p = cals/goal;
  if(p>1.1) return "#FF5252";
  if(p>0.9) return "#FF7043";
  return "#4CAF50";
}

function App() {
  const [tab, setTab] = useState("planner");
  const [meals, setMeals] = useState(SAMPLE_MEALS);
  const [foods, setFoods] = useState(SAMPLE_FOODS);
  const [dayOrder, setDayOrder] = useState(ALL_DAYS);
  const [plan, setPlan] = useState({});
  const [reorderMode, setReorderMode] = useState(false);
  const [leftoversModal, setLeftoversModal] = useState(null); // {day, mealType, meal}

  const [pickerModal, setPickerModal] = useState(null);
  const [ingModal, setIngModal] = useState(null);
  const [addMealModal, setAddMealModal] = useState(false);
  const [scanModal, setScanModal] = useState(false);
  const [scanMode, setScanMode] = useState("barcode"); // "barcode" | "label"
  const [scanTarget, setScanTarget] = useState("default"); // "default" | "editFood"
  const [barcodeBuffer, setBarcodeBuffer] = useState(""); // accumulates keystrokes from USB barcode scanners
  const barcodeTimer = useRef(null);

  // Serving scaler — per recipe view session
  const [recipeServings, setRecipeServings] = useState(null); // null = use original

  // Meal ratings and notes
  const [mealMeta, setMealMeta] = useState({}); // {mealId: {rating: 1-5, note: string}}
  const [ratingModal, setRatingModal] = useState(null); // meal object

  // Cook time filter in picker modal
  const [pickerFilter, setPickerFilter] = useState("all"); // "all" | "quick" (≤30min) | "any protein tag"
  const [importModal, setImportModal] = useState(false);
  const [importUrl, setImportUrl] = useState("");
  const [importText, setImportText] = useState("");
  const [importMode, setImportMode] = useState("url"); // "url" | "paste"
  const [importLoading, setImportLoading] = useState(false);
  const [importResult, setImportResult] = useState(null); // parsed recipe preview
  const [importError, setImportError] = useState("");

  const [search, setSearch] = useState("");
  const [prefs, setPrefs] = useState([]);
  const [aiSugs, setAiSugs] = useState([]);
  const [aiLoading, setAiLoading] = useState(false);

  // Week planner state
  const [wpMealTypes, setWpMealTypes] = useState(["Dinner"]);
  const [wpQuotas, setWpQuotas] = useState([
    {id:"beef", label:"Beef", emoji:"🥩", count:2},
    {id:"chicken", label:"Chicken", emoji:"🍗", count:2},
    {id:"pork", label:"Pork", emoji:"🥓", count:1},
    {id:"seafood", label:"Seafood/Fish", emoji:"🐟", count:1},
    {id:"pasta", label:"Pasta", emoji:"🍝", count:1},
    {id:"vegetarian", label:"Vegetarian", emoji:"🥦", count:0},
    {id:"quick", label:"30-min or less", emoji:"⚡", count:0},
  ]);
  const [wpDayFlags, setWpDayFlags] = useState({});
  const [wpCustomNote, setWpCustomNote] = useState("");
  const [wpLoading, setWpLoading] = useState(false);
  const [wpPreview, setWpPreview] = useState(null);
  const [wpError, setWpError] = useState("");

  const [grocery, setGrocery] = useState([]);
  const [checked, setChecked] = useState({});
  const [newGrocery, setNewGrocery] = useState("");
  const [newMeal, setNewMeal] = useState({name:"",emoji:"🍽️",calories:"",protein:"",carbs:"",fat:"",ingredients:""});

  // ── Food Library state ───────────────────────────────────────────────────────
  const [foodSearch, setFoodSearch] = useState("");
  const [addFoodModal, setAddFoodModal] = useState(false);
  const [editFoodModal, setEditFoodModal] = useState(null); // food object being edited
  const [newFood, setNewFood] = useState({name:"",unit:"g",calsPerUnit:"",protein:"",carbs:"",fat:"",category:"other"});

  // ── Quick Meal Builder (compose a meal from individual foods, e.g. sandwich + grapes) ──
  const [quickMealModal, setQuickMealModal] = useState(null); // {day, mealType} or {standalone:true}
  const [quickMealItems, setQuickMealItems] = useState([]); // [{foodId, qty, unit}]
  const [quickMealSearch, setQuickMealSearch] = useState("");
  const [quickMealName, setQuickMealName] = useState("");
  const [saveQuickMealPrompt, setSaveQuickMealPrompt] = useState(false);
  const [pendingQuickMeal, setPendingQuickMeal] = useState(null);

  // ── Data persistence ─────────────────────────────────────────────────────────
  const [synced, setSynced] = useState(false);
  const [syncStatus, setSyncStatus] = useState(""); // "" | "saving" | "saved" | "error"
  const saveTimer = useRef(null);

  // Load data from server on mount
  React.useEffect(() => {
    fetch('/api/data')
      .then(r => r.json())
      .then(db => {
        if (db.meals?.length)    setMeals(db.meals);
        if (db.foods?.length)    setFoods(db.foods);
        if (db.plan)             setPlan(db.plan);
        if (db.dayOrder?.length) setDayOrder(db.dayOrder);
        if (db.grocery?.length)  setGrocery(db.grocery);
        if (db.checkedItems)     setChecked(db.checkedItems);
        setSynced(true);
      })
      .catch(() => setSynced(true)); // still work offline if server unreachable
  }, []);

  // Debounced save — fires 1.5s after last change
  const saveToServer = React.useCallback((data) => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    setSyncStatus("saving");
    saveTimer.current = setTimeout(() => {
      fetch('/api/data', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(r => r.json())
      .then(() => { setSyncStatus("saved"); setTimeout(() => setSyncStatus(""), 2000); })
      .catch(() => setSyncStatus("error"));
    }, 1500);
  }, []);

  // Watch state and auto-save
  React.useEffect(() => { if (synced) saveToServer({ meals }); }, [meals, synced]);
  React.useEffect(() => { if (synced) saveToServer({ foods }); }, [foods, synced]);
  React.useEffect(() => { if (synced) saveToServer({ plan }); }, [plan, synced]);
  React.useEffect(() => { if (synced) saveToServer({ dayOrder }); }, [dayOrder, synced]);
  React.useEffect(() => { if (synced) saveToServer({ grocery }); }, [grocery, synced]);
  React.useEffect(() => { if (synced) saveToServer({ checkedItems: checked }); }, [checked, synced]);



  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const [scanning, setScanning] = useState(false);
  const [scanResult, setScanResult] = useState(null);
  const [scanLoading, setScanLoading] = useState(false);

  // Drag reorder
  // Tap-based day reordering (works on mobile)
  const moveDayLeft = (day) => {
    setDayOrder(prev => {
      const arr = [...prev];
      const idx = arr.indexOf(day);
      if(idx <= 0) return arr;
      [arr[idx-1], arr[idx]] = [arr[idx], arr[idx-1]];
      return arr;
    });
  };
  const moveDayRight = (day) => {
    setDayOrder(prev => {
      const arr = [...prev];
      const idx = arr.indexOf(day);
      if(idx >= arr.length-1) return arr;
      [arr[idx], arr[idx+1]] = [arr[idx+1], arr[idx]];
      return arr;
    });
  };

  // Leftovers — copy a dinner to the next day's lunch
  const applyLeftovers = (day, mealType, targetMealType) => {
    const meal = plan[day]?.[mealType];
    if(!meal) return;
    const dayIdx = dayOrder.indexOf(day);
    const nextDay = dayOrder[dayIdx + 1];
    if(!nextDay) { alert("No next day in your week to add leftovers to."); return; }
    setPlan(prev => ({
      ...prev,
      [nextDay]: {
        ...(prev[nextDay]||{}),
        [targetMealType]: { ...meal, name: meal.name + " (Leftovers)" }
      }
    }));
    setLeftoversModal(null);

        {/* SCAN MODAL */}
        {scanModal&&<div className="overlay" onClick={()=>{setScanModal(false);stopCamera();setScanResult(null);}}>

            <button className="modal-close" onClick={()=>{setScanModal(false);stopCamera();setScanResult(null);}}>×</button>
            <h2>📷 Scan Food</h2>

            {/* Mode toggle */}
            <div className="import-tabs" style={{marginBottom:14}}>
              <button className={"import-tab"+(scanMode==="barcode"?" active":"")} onClick={()=>{setScanMode("barcode");setScanResult(null);}}>🔲 Barcode</button>
              <button className={"import-tab"+(scanMode==="label"?" active":"")} onClick={()=>{setScanMode("label");setScanResult(null);}}>📋 Nutrition Label</button>
            </div>
            <p style={{fontSize:12,color:"#999",marginBottom:14}}>
              {scanMode==="barcode"

            </p>

            {!scanning&&!scanResult&&!scanLoading&&<div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:44,marginBottom:12}}>{scanMode==="barcode"?"🔲":"📋"}</div>
              <div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>

                  <div className="scanner-frame" style={{width: scanMode==="barcode"?"220px":"180px", height: scanMode==="barcode"?"100px":"130px"}}/>

              </div>
              <canvas ref={canvasRef} style={{display:"none"}}/>
              <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                <button className="btn btn-primary" onClick={captureAndAnalyze}>📸 Capture</button>

            {scanLoading&&<div style={{textAlign:"center",padding:"24px 0"}}>
              <div className="spinner" style={{width:30,height:30,borderWidth:4}}/>
              <div style={{marginTop:12,fontSize:13,color:"#888"}}>
                {scanMode==="barcode" ? "Looking up barcode..." : "Reading nutrition label..."}
              </div>
            </div>}

            {scanResult&&!scanResult.error&&<div className="scan-result-box">
              <div style={{fontWeight:800,fontSize:14,marginBottom:10}}>✅ Review & Edit Before Saving</div>
              {scanResult.image&&<img src={scanResult.image} alt={scanResult.name} style={{width:56,height:56,objectFit:"contain",float:"right",borderRadius:8,marginLeft:10,marginBottom:8}}/>}
              <div className="frow" style={{marginBottom:8}}>
                <div className="fg" style={{margin:0,gridColumn:"1/-1"}}>
                  <label className="fl">Name</label>
                  <input className="fi" style={{fontSize:13}} value={scanResult.name||""} onChange={e=>setScanResult(p=>({...p,name:e.target.value}))}/>
                </div>
              </div>
              {scanResult.brand&&<div style={{fontSize:11,color:"#888",marginBottom:8}}>Brand: {scanResult.brand}</div>}
              {scanResult.servingLabel&&<div style={{fontSize:11,color:"#aaa",marginBottom:10}}>Per: {scanResult.servingLabel}</div>}
              <div className="frow" style={{marginBottom:6}}>
                <div className="fg" style={{margin:0}}>
                  <label className="fl">Calories / unit</label>
                  <input className="fi" style={{fontSize:13}} type="number" value={scanResult.calsPerUnit||0} onChange={e=>setScanResult(p=>({...p,calsPerUnit:parseFloat(e.target.value)||0}))}/>
                </div>
                <div className="fg" style={{margin:0}}>
                  <label className="fl">Unit</label>
                  <input className="fi" style={{fontSize:13}} value={scanResult.unit||"serving"} onChange={e=>setScanResult(p=>({...p,unit:e.target.value}))}/>
                </div>
              </div>
              <div className="frow" style={{marginBottom:10}}>
                <div className="fg" style={{margin:0}}>
                  <label className="fl">Protein (g)</label>
                  <input className="fi" style={{fontSize:13}} type="number" value={scanResult.protein||0} onChange={e=>setScanResult(p=>({...p,protein:parseFloat(e.target.value)||0}))}/>
                </div>
                <div className="fg" style={{margin:0}}>
                  <label className="fl">Carbs (g)</label>
                  <input className="fi" style={{fontSize:13}} type="number" value={scanResult.carbs||0} onChange={e=>setScanResult(p=>({...p,carbs:parseFloat(e.target.value)||0}))}/>
                </div>
                <div className="fg" style={{margin:0}}>
                  <label className="fl">Fat (g)</label>
                  <input className="fi" style={{fontSize:13}} type="number" value={scanResult.fat||0} onChange={e=>setScanResult(p=>({...p,fat:parseFloat(e.target.value)||0}))}/>
                </div>
              </div>
              <div style={{display:"flex",gap:8,justifyContent:"flex-end",flexWrap:"wrap"}}>
                <button className="btn btn-secondary btn-sm" onClick={()=>{setScanResult(null);}}>Scan Again</button>
                <button className="btn btn-primary btn-sm" onClick={applyScanResult}>
                  {scanTarget==="editFood" ? "↩ Update Food Info" : ingModal||quickMealModal ? "+ Add to Meal" : "💾 Save to Foods"}
                </button>
              </div>
            </div>}

            {scanResult?.error==="not_found"&&<div style={{background:"#FFF3E0",border:"1.5px solid #FFE0B2",borderRadius:12,padding:14,fontSize:13,color:"#E65100"}}>
              ⚠️ Barcode <strong>{scanResult.barcode}</strong> not found in the database. Try scanning the nutrition label instead.
              <div style={{display:"flex",gap:8,marginTop:10}}>
                <button className="btn btn-secondary btn-xs" onClick={()=>{setScanResult(null);}}>Try Again</button>
                <button className="btn btn-ghost btn-xs" onClick={()=>{setScanResult(null);setScanMode("label");}}>Scan Label Instead</button>
              </div>
            </div>}

            {scanResult?.error&&scanResult.error!=="not_found"&&<div style={{background:"#FFF3E0",border:"1.5px solid #FFE0B2",borderRadius:12,padding:14,fontSize:13,color:"#E65100"}}>

          </div>
        </div>}

        {/* IMPORT RECIPE MODAL */}
        {importModal&&<div className="overlay" onClick={()=>{setImportModal(false);setImportResult(null);setImportError("");}}>
          <div className="modal modal-lg" onClick={e=>e.stopPropagation()} style={{maxHeight:"92vh"}}>
            <button className="modal-close" onClick={()=>{setImportModal(false);setImportResult(null);setImportError("");}}>×</button>
            <h2>🔗 Import Recipe</h2>
            <p style={{fontSize:12,color:"#999",marginBottom:14}}>Paste a link from Pinterest, any food blog, or copy-paste recipe text. AI strips all the ads and blog filler.</p>

            {!importResult&&<>
              <div className="import-tabs">
                <button className={"import-tab"+(importMode==="url"?" active":"")} onClick={()=>setImportMode("url")}>🔗 From URL</button>
                <button className={"import-tab"+(importMode==="paste"?" active":"")} onClick={()=>setImportMode("paste")}>📋 Paste Text</button>
              </div>

              {importMode==="url"&&<>
                <label className="fl">Recipe URL</label>
                <input className="import-url-input" placeholder="https://pinterest.com/pin/... or any recipe website"
                  value={importUrl} onChange={e=>setImportUrl(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&importRecipe()}/>
                <div style={{fontSize:11,color:"#aaa",marginBottom:12}}>Works with Pinterest, Allrecipes, Food Network, NYT Cooking, food blogs, and more.</div>
              </>}

              {importMode==="paste"&&<>
                <label className="fl">Paste Recipe Text</label>
                <textarea className="import-paste-area" placeholder={"Paste the recipe here — ingredients, directions, whatever you copied.\nAI will extract just the recipe parts.\n\nTip: on Pinterest, click through to the original site, then copy the full page text."}
                  value={importText} onChange={e=>setImportText(e.target.value)}/>
              </>}

              {importError&&<div style={{background:"#FFF3E0",border:"1.5px solid #FFE0B2",borderRadius:10,padding:12,fontSize:12,color:"#E65100",marginBottom:12}}>{importError}</div>}

              <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                <button className="btn btn-secondary" onClick={()=>setImportModal(false)}>Cancel</button>
                <button className="btn btn-primary" onClick={importRecipe} disabled={importLoading}>
                  {importLoading?<><span className="spinner"/> {importMode==="url"?"Fetching & extracting...":"Extracting recipe..."}</>:"✨ Extract Recipe"}
                </button>
              </div>
            </>}

            {importResult&&<>
              <div className="recipe-preview">
                <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10}}>
                  <span style={{fontSize:32}}>{importResult.emoji}</span>
                  <div style={{flex:1}}>
                    <div className="recipe-preview-name">{importResult.name}</div>
                    <div className="recipe-preview-meta">
                      {importResult.servings&&<span>🍽️ {importResult.servings} servings</span>}
                      {importResult.prepTime&&<span>⏱️ Prep: {importResult.prepTime}</span>}
                      {importResult.cookTime&&<span>🔥 Cook: {importResult.cookTime}</span>}
                    </div>
                    {importResult.sourceName&&<div style={{fontSize:11,color:"#4CAF50"}}>🔗 {importResult.sourceName}</div>}
                  </div>
                </div>

                <div style={{fontWeight:800,fontSize:11,color:"#aaa",textTransform:"uppercase",letterSpacing:".5px",marginBottom:8}}>Ingredients</div>
                <ul className="recipe-ing-list">
                  {importResult.ingredients.map((ing,i)=>(
                    <li key={i}><span>{ing.raw||ing.name}</span></li>
                  ))}
                </ul>

                {importResult.directions?.length>0&&<>
                  <button className="view-directions-btn" onClick={()=>setShowDirections(p=>!p)}>
                    {showDirections?"▲ Hide directions":"▼ Show directions"} ({importResult.directions.length} steps)
                  </button>
                  {showDirections&&<div className="directions-panel">
                    {importResult.directions.map((step,i)=>(
                      <div key={i} className="recipe-step">
                        <div className="recipe-step-num">{i+1}</div>
                        <div>{step}</div>
                      </div>
                    ))}
                  </div>}
                </>}
              </div>

              <div style={{background:"#FFF9E6",border:"1.5px solid #FFE082",borderRadius:10,padding:12,fontSize:12,color:"#6D4C1A",marginBottom:14}}>
                ⚡ Nutrition estimates are calculated from the ingredients. You can fine-tune them later using the Edit Nutrition button.
              </div>

              <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                <button className="btn btn-secondary" onClick={()=>setImportResult(null)}>← Try Again</button>
                <button className="btn btn-primary" onClick={saveImportedRecipe}>✅ Save to Library</button>
              </div>
            </>}
          </div>
        </div>}

        {/* VIEW RECIPE MODAL */}
        {viewRecipeModal&&(()=>{
          const baseServings = viewRecipeModal.servings || 1;
          const scaledServings = recipeServings || baseServings;
          const scale = scaledServings / baseServings;
          const scaledIngs = viewRecipeModal.ingredients.map(ing => ({
            ...ing, qty: Math.round(ing.qty * scale * 100) / 100
          }));
          const totalT = calcMealTotals(scaledIngs);
          // Per-serving values (what one person eats)
          const t = {
            calories: Math.round(totalT.calories / scaledServings),
            protein:  Math.round(totalT.protein  / scaledServings),
            carbs:    Math.round(totalT.carbs    / scaledServings),
            fat:      Math.round(totalT.fat      / scaledServings),
          };
          const meta = mealMeta[viewRecipeModal.id] || {rating: viewRecipeModal.rating||0, note: viewRecipeModal.note||""};
          return (
          <div className="overlay" onClick={()=>{setViewRecipeModal(null);setRecipeServings(null);}}>
            <div className="modal modal-lg" onClick={e=>e.stopPropagation()} style={{maxHeight:"90vh",maxHeight:"90dvh",padding:0,overflow:"hidden",display:"flex",flexDirection:"column",margin:"auto"}}>

              {/* Header */}
              <div style={{padding:"18px 20px 14px",borderBottom:"1px solid #F0F0F0",flexShrink:0}}>
                <button className="modal-close" onClick={()=>{setViewRecipeModal(null);setRecipeServings(null);}}>×</button>
                <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                  <span style={{fontSize:38,lineHeight:1}}>{viewRecipeModal.emoji}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:17,fontWeight:800,letterSpacing:"-0.4px",lineHeight:1.2,marginBottom:4}}>{viewRecipeModal.name}</div>
                    {/* Star rating */}
                    <div style={{display:"flex",gap:2,marginBottom:6}}>
                      {[1,2,3,4,5].map(star=>(
                        <button key={star} onClick={()=>{
                          const newRating = meta.rating===star ? 0 : star;
                          saveMealMeta(viewRecipeModal.id, newRating, meta.note||"");
                          setMealMeta(p=>({...p,[viewRecipeModal.id]:{...meta,rating:newRating}}));
                        }} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,padding:"0 1px",
                          color: star<=(meta.rating||0) ? "#F59E0B" : "#DDD"}}>★</button>
                      ))}
                      <span style={{fontSize:11,color:"#aaa",marginLeft:4,alignSelf:"center"}}>
                        {meta.rating>0 ? ["","Not great","It was ok","Pretty good","Really good","Absolutely love it!"][meta.rating] : "Rate this meal"}
                      </span>
                    </div>
                    <div style={{display:"flex",gap:10,flexWrap:"wrap",fontSize:11,color:"#888",marginBottom:6}}>
                      {viewRecipeModal.prepTime&&<span>⏱️ {viewRecipeModal.prepTime} prep</span>}
                      {viewRecipeModal.cookTime&&<span>🔥 {viewRecipeModal.cookTime} cook</span>}
                    </div>
                    {/* Macro pills — per serving */}
                    <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                      {[["🔥",t.calories,"cal"],["💪",t.protein+"g","protein"],["🌾",t.carbs+"g","carbs"],["🥑",t.fat+"g","fat"]].map(([icon,val,lbl])=>(
                        <div key={lbl} style={{background:"#F5F5F5",borderRadius:8,padding:"3px 7px",fontSize:10,textAlign:"center"}}>
                          <span style={{fontWeight:800}}>{icon} {val}</span><span style={{color:"#aaa",marginLeft:2}}>{lbl}</span>
                        </div>
                      ))}
                      <span style={{fontSize:10,color:"#aaa",marginLeft:2}}>per serving</span>
                    </div>
                  </div>
                </div>
                {/* Serving scaler */}
                <div style={{display:"flex",alignItems:"center",gap:10,marginTop:12,padding:"10px 12px",background:"#F8F8F8",borderRadius:10}}>
                  <span style={{fontSize:12,fontWeight:700,color:"#555"}}>Servings:</span>
                  <button onClick={()=>setRecipeServings(Math.max(1,scaledServings-1))} style={{background:"#fff",border:"1.5px solid #DDD",borderRadius:6,width:28,height:28,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                  <span style={{fontWeight:800,fontSize:16,minWidth:24,textAlign:"center"}}>{scaledServings}</span>
                  <button onClick={()=>setRecipeServings(scaledServings+1)} style={{background:"#fff",border:"1.5px solid #DDD",borderRadius:6,width:28,height:28,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                  <span style={{fontSize:11,color:"#aaa"}}>(base: {baseServings})</span>
                  {scaledServings!==baseServings&&<button onClick={()=>setRecipeServings(null)} style={{marginLeft:"auto",background:"none",border:"none",color:"#4CAF50",fontSize:11,fontWeight:700,cursor:"pointer"}}>Reset</button>}
                </div>
                {viewRecipeModal.sourceUrl&&<a href={viewRecipeModal.sourceUrl} target="_blank" rel="noreferrer" style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:10,fontSize:11,color:"#4CAF50",textDecoration:"none",fontWeight:700}}>🔗 {viewRecipeModal.sourceName||"View original recipe"}</a>}
              </div>

              {/* Scrollable body */}
              <div style={{overflowY:"auto",flex:1,padding:"14px 20px 20px",WebkitOverflowScrolling:"touch"}}>

                {/* Ingredients — full recipe quantities */}
                <div style={{fontWeight:800,fontSize:11,color:"#aaa",textTransform:"uppercase",letterSpacing:".6px",marginBottom:8}}>
                  Ingredients ({scaledIngs.length})
                  {scale!==1&&<span style={{color:"#4CAF50",marginLeft:6,fontWeight:700}}>scaled {scale>1?"up":"down"}</span>}
                </div>
                <div style={{background:"#FAFAFA",borderRadius:12,padding:"4px 0",marginBottom:18}}>
                  {scaledIngs.map((ing,i)=>{
                    const ic = Math.round(ing.qty * ing.calsPerUnit);
                    const displayQty = Number.isInteger(ing.qty) ? ing.qty : Math.round(ing.qty*100)/100;
                    const displayAmt = ing.raw && scale===1 ? ing.raw : `${displayQty} ${ing.unit} ${ing.name}`;
                    return (
                      <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",borderBottom:i<scaledIngs.length-1?"1px solid #F0F0F0":"none"}}>
                        <span style={{color:"#4CAF50",fontSize:14,flexShrink:0}}>·</span>
                        <span style={{flex:1,fontSize:13,color:"#1A1A2E"}}>{displayAmt}</span>
                        {ic>0&&<span style={{fontSize:11,color:"#FF7043",fontWeight:700,flexShrink:0}}>{ic} cal</span>}

                </div>

                <div style={{marginBottom:16}}>

                      <div style={{fontSize:13,lineHeight:1.65,color:"#333",paddingTop:4}}>{step}</div>

                </> : <div style={{background:"#FFFBF0",border:"1.5px dashed #FFE082",borderRadius:12,padding:14,fontSize:13,color:"#888",textAlign:"center"}}>
                  No directions saved yet.
                  <span style={{fontSize:11,marginTop:4,display:"block"}}>Import a recipe to get step-by-step directions.</span>
                </div>}
              </div>

              {/* Footer */}
              <div style={{padding:"10px 20px",borderTop:"1px solid #F0F0F0",display:"flex",gap:8,justifyContent:"space-between",alignItems:"center",flexShrink:0,background:"#fff",position:"sticky",bottom:0}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>{setViewRecipeModal(null);setRecipeServings(null);openLibIngModal(viewRecipeModal);}}>✏️ Edit Nutrition</button>
                <button className="btn btn-primary btn-sm" style={{minWidth:80}} onClick={()=>{setViewRecipeModal(null);setRecipeServings(null);}}>✕ Close</button>
              </div>
            </div>
          </div>
          );
        })()}


        {addMealModal&&<div className="overlay" onClick={()=>setAddMealModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <button className="modal-close" onClick={()=>setAddMealModal(false)}>×</button>
            <h2>Add New Meal</h2>
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              <div className="fg" style={{width:80,margin:0}}>
                <label className="fl">Emoji</label>
                <input className="fi" style={{width:80}} value={newMeal.emoji} onChange={e=>setNewMeal(p=>({...p,emoji:e.target.value}))}/>
              </div>
              <div className="fg" style={{flex:1,margin:0}}>
                <label className="fl">Meal Name *</label>
                <input className="fi" placeholder="e.g. Chicken Tacos" value={newMeal.name} onChange={e=>setNewMeal(p=>({...p,name:e.target.value}))}/>
              </div>
            </div>
            <div className="frow">
              <div className="fg"><label className="fl">Calories (total)</label><input className="fi" type="number" placeholder="450" value={newMeal.calories} onChange={e=>setNewMeal(p=>({...p,calories:e.target.value}))}/></div>
              <div className="fg"><label className="fl">Protein (g)</label><input className="fi" type="number" placeholder="30" value={newMeal.protein} onChange={e=>setNewMeal(p=>({...p,protein:e.target.value}))}/></div>
            </div>
            <div className="frow">
              <div className="fg"><label className="fl">Carbs (g)</label><input className="fi" type="number" placeholder="40" value={newMeal.carbs} onChange={e=>setNewMeal(p=>({...p,carbs:e.target.value}))}/></div>
              <div className="fg"><label className="fl">Fat (g)</label><input className="fi" type="number" placeholder="15" value={newMeal.fat} onChange={e=>setNewMeal(p=>({...p,fat:e.target.value}))}/></div>
            </div>
            <div className="fg">
              <label className="fl">Ingredients (comma-separated)</label>
              <input className="fi" placeholder="chicken, rice, garlic..." value={newMeal.ingredients} onChange={e=>setNewMeal(p=>({...p,ingredients:e.target.value}))}/>
              <div style={{fontSize:10,color:"#bbb",marginTop:4}}>After saving, use the Edit Nutrition button to set exact per-ingredient calorie values.</div>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}>
              <button className="btn btn-secondary" onClick={()=>setAddMealModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={handleAddMeal}>Save Meal</button>
            </div>
          </div>
        </div>}
      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
